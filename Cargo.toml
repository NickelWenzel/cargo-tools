[workspace]
members = [
    "packages/cargo_tools",
    "packages/cargo_tools_vscode",
    "packages/cargo_tools_macros",
]
default-members = [
    "packages/cargo_tools",
    "packages/cargo_tools_vscode",
    "packages/cargo_tools_macros",
]

resolver = "2"

[workspace.dependencies]
cargo_tools = { path = "packages/cargo_tools" }
cargo_tools_vscode = { path = "packages/cargo_tools_vscode" }
cargo_tools_macros = { path = "packages/cargo_tools_macros" }

async-broadcast = "0.7.2"
futures = "0.3.31"
cargo_metadata = "0.23.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6.0"
async-trait = "0.1.89"
thiserror = "2.0.17"
syn = "2.0.110"
quote = "1.0.42"
proc-macro2 = "1.0"
