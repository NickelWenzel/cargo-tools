[workspace]
members = ["packages/cargo_tools_vscode"]
default-members = ["packages/cargo_tools_vscode"]

resolver = "2"

[workspace.dependencies]
cargo_metadata = "0.23.0"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6.0"
async-trait = "0.1.89"
