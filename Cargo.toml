[workspace]
members = ["packages/cargo_tools_vscode", "packages/cargo_tools_vscode_macros"]
default-members = [
    "packages/cargo_tools_vscode",
    "packages/cargo_tools_vscode_macros",
]

resolver = "2"

[workspace.dependencies]
cargo_tools_vscode = { path = "packages/cargo_tools_vscode" }
cargo_tools_vscode_macros = { path = "packages/cargo_tools_vscode_macros" }

cargo_metadata = "0.23.0"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6.0"
async-trait = "0.1.89"
thiserror = "1.0"
syn = "2.0.109"
quote = "1.0.42"
proc-macro2 = "1.0"
