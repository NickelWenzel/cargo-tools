[workspace]
members = [
    "packages/cargo_tools",
    "packages/cargo_tools_vscode",
    "packages/wasm_async_trait",
    "packages/iced_headless",
]
default-members = [
    "packages/cargo_tools",
    "packages/cargo_tools_vscode",
    "packages/wasm_async_trait",
    "packages/iced_headless",
]

resolver = "2"

[workspace.dependencies]
cargo_tools = { path = "packages/cargo_tools" }
cargo_tools_vscode = { path = "packages/cargo_tools_vscode" }
wasm_async_trait = { path = "packages/wasm_async_trait" }
iced_headless = { path = "packages/iced_headless" }

console_log = "1.0.0"
async-broadcast = "0.7.2"
futures = "0.3.31"
cargo_metadata = "0.23.1"
wasm-bindgen = "0.2.106"
wasm-bindgen-futures = "0.4.56"
wasm-bindgen-test = "0.3.56"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6.0"
async-trait = "0.1.89"
thiserror = "2.0.17"
syn = "2.0.111"
quote = "1.0.42"
proc-macro2 = "1.0"
iced = { version = "0.14.0", default-features = false, features = [
    "wayland",
    "x11",
] }
iced_futures = { version = "0.14.0" }
iced_runtime = { version = "0.14.0" }
tokio = { version = "1.0", features = ["rt-multi-thread", "time", "macros"] }
tokio-stream = "0.1.17"
log = "0.4.29"
tracing = "0.1.43"
tracing-test = "0.2.5"
trybuild = "1.0"
