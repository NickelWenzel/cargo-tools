[package]
name = "iced_viewless"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Wenzel"]
description = "Headless application runtime for iced, enabling background services without UI"
license = "MIT"
repository = "https://github.com/NickelWenzel/cargo-tools"
keywords = ["iced", "headless", "daemon", "runtime", "async"]
categories = ["asynchronous", "gui"]

[dependencies]
iced = { workspace = true }
iced_core = { workspace = true }
iced_futures = { workspace = true }
iced_runtime = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, optional = true, features = ["time", "macros"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "time"] }

[features]
default = []
tokio = ["dep:tokio", "iced_futures/tokio"]
async-std = ["iced_futures/async-std"]
smol = ["iced_futures/smol"]
thread-pool = ["iced_futures/thread-pool"]
