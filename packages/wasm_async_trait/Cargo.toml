[package]
name = "wasm_async_trait"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Wenzel"]
description = "Automatically applies the correct async_trait variant for WASM and native targets"
license = "MIT"
repository = "https://github.com/NickelWenzel/cargo-tools"
keywords = ["wasm", "async", "trait", "macro", "async-trait"]
categories = ["wasm", "asynchronous", "development-tools"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["full"] }
quote = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
trybuild = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
iced_headless = { workspace = true, features = ["tokio"] }
tokio = { workspace = true, features = ["rt", "macros"] }
