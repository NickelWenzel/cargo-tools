[package]
name = "iced_headless"
version = "0.1.0"
edition = "2024"
authors = ["Nicolas Wenzel"]
description = "Headless application runtime for iced, enabling background services without UI"
license = "MIT"
repository = "https://github.com/NickelWenzel/cargo-tools/tree/master/packages/iced_headless"
documentation = "https://docs.rs/iced_headless"
exclude = ["tests/"]
keywords = ["iced", "headless", "daemon", "runtime", "async"]
categories = ["asynchronous"]

[dependencies]
iced = { workspace = true }
iced_futures = { workspace = true }
iced_runtime = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }

tokio = { workspace = true, optional = true, features = [
    "sync",
    "time",
    "macros",
] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = { workspace = true }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }
tracing = { workspace = true }
tracing-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
iced_headless = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "time"] }

[features]
default = ["thread-pool"]
tokio = ["dep:tokio", "iced/tokio"]
smol = ["iced/smol"]
thread-pool = ["iced/thread-pool"]
