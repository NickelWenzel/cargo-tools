name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    # Enhanced npm cache with lockfile hash
    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-

    # Setup Rust toolchain
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install cargo tools
      uses: taiki-e/install-action@v2
      with:
        tool: wasm-pack@0.14.0,wasm-bindgen-cli@0.2.106

    - name: Install dependencies
      run: npm ci

    - name: Compile extension
      run: npm run compile

    - name: Run Rust linter and check formatting
      run: cargo lint-cargo

    - name: Run TypeScript linter
      run: npm run lint

    - name: Run tests
      run: cargo xt-test

  build-package:
    name: Build Extension Package
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    # Enhanced npm cache
    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-

    # Cache webpack build artifacts
    - name: Cache webpack build
      uses: actions/cache@v4
      with:
        path: |
          dist/
          .webpack-cache/
        key: ${{ runner.os }}-webpack-${{ hashFiles('vscode_extension/webpack.config.js', 'vscode_extension/tsconfig.json', 'vscode_extension/src/**/*.ts') }}
        restore-keys: |
          ${{ runner.os }}-webpack-

    - name: Install dependencies
      run: npm ci

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Package extension
      run: npm exec -- vsce package --no-dependencies --out cargo-tools-${{ github.sha }}.vsix

    - name: Upload extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: cargo-tools-extension
        path: '*.vsix'
        retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    # Enhanced npm cache
    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate
