name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # A manual run validates and packages the extension without publishing it.
  workflow_dispatch:
    inputs:
      mode:
        description: What should this non-publishing run validate?
        required: true
        type: choice
        default: build
        options:
          - build
          - marketplace-identity

concurrency:
  group: marketplace-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Validate and build release
    if: github.event_name == 'push' || inputs.mode == 'build'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Rust build tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0,wasm-bindgen-cli@0.2.106

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCK_VERSION=$(node -p "require('./package-lock.json').packages[''].version")

          if [[ "$PACKAGE_VERSION" != "$LOCK_VERSION" ]]; then
            echo "package.json ($PACKAGE_VERSION) and package-lock.json ($LOCK_VERSION) disagree"
            exit 1
          fi

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG_VERSION=${GITHUB_REF_NAME#v}
            if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
              echo "package.json ($PACKAGE_VERSION) and tag ($TAG_VERSION) disagree"
              exit 1
            fi

            if ! grep -Eq "^## \\[$PACKAGE_VERSION\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
              echo "CHANGELOG.md needs a dated section for $PACKAGE_VERSION"
              exit 1
            fi
          fi

      - name: Run TypeScript linter
        run: npm run lint

      - name: Run Rust linter and formatting checks
        run: cargo lint-cargo

      - name: Run tests
        run: cargo xt-test

      - name: Package extension
        run: npm run package

      - name: Record package digest
        shell: bash
        run: sha256sum cargo-tools.vsix | tee cargo-tools.vsix.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-tools-extension-${{ github.sha }}
          path: |
            cargo-tools.vsix
            cargo-tools.vsix.sha256
          if-no-files-found: error
          retention-days: 30

  verify-marketplace-identity:
    name: Verify Marketplace identity
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'marketplace-identity'
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate with Microsoft Entra ID
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Show Marketplace identity ID
        shell: bash
        run: |
          ID=$(az rest \
            --url https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query id \
            --output tsv)
          if [[ -z "$ID" ]]; then
            echo "Microsoft Entra login succeeded, but no Marketplace identity ID was returned"
            exit 1
          fi
          echo "Marketplace identity ID: $ID"
          echo "Add this ID to the NickelWenzel Marketplace publisher as a Contributor."

  publish-marketplace:
    name: Publish to VS Code Marketplace
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build-release
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install publishing tool
        run: npm ci --ignore-scripts

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: cargo-tools-extension-${{ github.sha }}

      - name: Verify release artifact
        run: sha256sum --check cargo-tools.vsix.sha256

      - name: Authenticate with Microsoft Entra ID
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Verify Marketplace identity
        shell: bash
        run: |
          ID=$(az rest \
            --url https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query id \
            --output tsv)
          if [[ -z "$ID" ]]; then
            echo "Microsoft Entra login succeeded, but no Marketplace identity ID was returned"
            exit 1
          fi
          echo "Publishing as Marketplace identity $ID"

      - name: Publish extension
        run: npm exec -- vsce publish --packagePath cargo-tools.vsix --azure-credential

  create-github-release:
    name: Create GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: publish-marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: cargo-tools-extension-${{ github.sha }}

      - name: Build release notes from changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" --match 'v[0-9]*' 2>/dev/null || true)

          {
            echo "## Cargo Tools $VERSION"
            echo
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
            echo
            echo "### Installation"
            echo
            echo "Install from the VS Code Marketplace, or download \`cargo-tools.vsix\` below and run:"
            echo
            echo '```bash'
            echo 'code --install-extension cargo-tools.vsix'
            echo '```'
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo
              echo "**Full comparison:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${GITHUB_REF_NAME}"
            fi
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cargo Tools ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            cargo-tools.vsix
            cargo-tools.vsix.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
